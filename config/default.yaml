plexautolanguages:
  update_level: "show"
  update_strategy: "next"
  trigger_on_play: true
  trigger_on_scan: true
  trigger_on_activity: false
  refresh_library_on_scan: true
  ignore_labels:
    - PAL_IGNORE
  ignore_libraries:
    - ""
  ignore_filepatterns:
    - ""

  plex:
    url: ""
    token: ""
    connection_max_retries: 300
    connection_retry_delay: 5

  scheduler:
    enable: true
    schedule_time: "02:00"

  notifications:
    enable: false
    apprise_configs: []

  data_path: ""

  debug: false
